<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompanySync - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 420px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 48px;
      height: 48px;
      color: #60a5fa;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .features {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.25rem;
      text-align: left;
    }
    .features h3 {
      font-size: 0.875rem;
      color: #60a5fa;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .features ul {
      list-style: none;
      font-size: 0.875rem;
    }
    .features li {
      padding: 0.375rem 0;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .features li::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #60a5fa;
      border-radius: 50%;
      flex-shrink: 0;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072M12 12h.01" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Some features are still available while you're in the field.</p>
    <div class="features">
      <h3>Available Offline</h3>
      <ul>
        <li>View cached customers and estimates</li>
        <li>Take inspection photos (queued for upload)</li>
        <li>Review saved project details</li>
        <li>Access cached reports</li>
      </ul>
    </div>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
